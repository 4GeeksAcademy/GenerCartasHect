<body class = "bg-success text-align-center text-justify-center">

        </div>
        <div class="row d-flex justify-content-center align-items-center text-center"

        <div class="row d-flex justify-content-end pe-4 sibul text-end" 
            style="height: 150px; font-size: 80px;">
        </div>
    </div>
    <diV class="container d-flex justify-content-center mt-4">
        <button id="btn-cambiar" class="btn btn-light form-control w-25">Cambiar Carta</button>
    </diV>
    <diV class="container d-flex justify-content-center mt-4">
        <input type="text" id="inputWidth"  value = "" class="form-control w-25" placeholder="width" style="text-align: center;">
        <input type="text" id="inputHeight" size="50" value = ""  class="form-control w-25" placeholder="height" style="text-align: center;">
    </diV>
